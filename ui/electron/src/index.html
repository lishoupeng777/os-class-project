<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual File System - 虚拟文件系统管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Microsoft YaHei';
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 左侧边栏 */
        .sidebar {
            width: 280px;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            padding: 20px 0;
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .user-info {
            font-size: 12px;
            color: #888;
        }

        .nav-section {
            padding: 0 10px;
            margin-bottom: 20px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            padding: 0 15px 8px;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 12px 15px;
            margin: 4px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .nav-item:hover {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(30, 30, 40, 0.5);
        }

        /* 顶部工具栏 */
        .toolbar {
            padding: 15px 30px;
            background: rgba(20, 20, 30, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #667eea;
        }

        .breadcrumb-item {
            cursor: pointer;
            transition: color 0.3s;
        }

        .breadcrumb-item:hover {
            color: #764ba2;
        }

        .toolbar-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            background: rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        /* 内容面板 */
        .content-panel {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }

        /* 左侧：文件浏览器 */
        .file-browser {
            flex: 1;
            background: rgba(20, 20, 30, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .file-browser-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            color: #667eea;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .file-item {
            padding: 12px 15px;
            margin: 4px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .file-item:hover {
            background: rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateX(5px);
        }

        .file-item.selected {
            background: rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.6);
        }

        .file-icon {
            font-size: 18px;
            min-width: 20px;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        /* 右侧：详情面板 */
        .right-panel {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: rgba(20, 20, 30, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
        }

        .card-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .stat-label {
            color: #888;
        }

        .stat-value {
            color: #667eea;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(20, 20, 30, 0.95);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #888;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 12px rgba(102, 126, 234, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.5);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .right-panel {
                width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">🗂️ VFS</div>
                <div class="user-info" id="currentUser">root@localhost</div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">系统</div>
                <div class="nav-item active" onclick="switchView('dashboard')">📊 仪表板</div>
                <div class="nav-item" onclick="switchView('files')">📁 文件浏览</div>
                <div class="nav-item" onclick="switchView('users')">👥 用户管理</div>
                <div class="nav-item" onclick="switchView('settings')">⚙️ 系统设置</div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">操作</div>
                <div class="nav-item" onclick="showModal('loginModal')">🔐 用户登录</div>
                <div class="nav-item" onclick="showModal('mkdirModal')">📂 新建文件夹</div>
                <div class="nav-item" onclick="showModal('createFileModal')">📄 新建文件</div>
                <div class="nav-item" onclick="logout()">🚪 登出</div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">帮助</div>
                <div class="nav-item" onclick="showHelp()">❓ 帮助文档</div>
                <div class="nav-item" onclick="about()">ℹ️ 关于</div>
            </div>
        </div>

        <!-- 主内容 -->
        <div class="main-content">
            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="breadcrumb">
                    <span>Home</span>
                    <span>/</span>
                    <span id="currentPath" class="breadcrumb-item">Root</span>
                </div>
                <div class="toolbar-actions">
                    <button class="btn" onclick="refreshData()">🔄 刷新</button>
                    <button class="btn btn-primary" onclick="showModal('formatModal')">⚡ 格式化</button>
                </div>
            </div>

            <!-- 内容面板 -->
            <div class="content-panel" id="dashboardView">
                <!-- 左侧：文件浏览器 -->
                <div class="file-browser">
                    <div class="file-browser-header">📂 文件列表</div>
                    <div class="file-list" id="fileList">
                        <div class="file-item">
                            <div class="file-icon">📁</div>
                            <div class="file-info">
                                <div class="file-name">加载中...</div>
                                <div class="file-meta">请稍候</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧：详情面板 -->
                <div class="right-panel">
                    <!-- 磁盘使用 -->
                    <div class="card">
                        <div class="card-title">💾 磁盘使用情况</div>
                        <div class="stat-item">
                            <span class="stat-label">已用容量</span>
                            <span class="stat-value" id="diskUsed">0 MB</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="diskProgress" style="width: 0%"></div>
                        </div>
                        <div class="stat-item" style="margin-top: 12px;">
                            <span class="stat-label">总容量</span>
                            <span class="stat-value">256 MB</span>
                        </div>
                    </div>

                    <!-- Inode 使用 -->
                    <div class="card">
                        <div class="card-title">🔗 Inode 使用情况</div>
                        <div class="stat-item">
                            <span class="stat-label">已用节点</span>
                            <span class="stat-value" id="inodeUsed">0</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="inodeProgress" style="width: 0%"></div>
                        </div>
                        <div class="stat-item" style="margin-top: 12px;">
                            <span class="stat-label">总节点数</span>
                            <span class="stat-value">1024</span>
                        </div>
                    </div>

                    <!-- 快速操作 -->
                    <div class="card">
                        <div class="card-title">⚡ 快速操作</div>
                        <button class="btn" style="width: 100%; justify-content: center;">📤 上传文件</button>
                        <button class="btn" style="width: 100%; justify-content: center; margin-top: 8px;">🗑️ 清空回收站</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-title">🔐 用户登录</div>
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" id="loginUser" placeholder="输入用户名">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="loginPass" placeholder="输入密码">
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal('loginModal')">取消</button>
                <button class="btn btn-primary" onclick="doLogin()">登录</button>
            </div>
        </div>
    </div>

    <!-- 创建文件夹模态框 -->
    <div class="modal" id="mkdirModal">
        <div class="modal-content">
            <div class="modal-title">📂 新建文件夹</div>
            <div class="form-group">
                <label class="form-label">文件夹名称</label>
                <input type="text" class="form-input" id="mkdirName" placeholder="输入文件夹名称">
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal('mkdirModal')">取消</button>
                <button class="btn btn-primary" onclick="doMkdir()">创建</button>
            </div>
        </div>
    </div>

    <!-- 创建文件模态框 -->
    <div class="modal" id="createFileModal">
        <div class="modal-content">
            <div class="modal-title">📄 新建文件</div>
            <div class="form-group">
                <label class="form-label">文件名称</label>
                <input type="text" class="form-input" id="createFileName" placeholder="输入文件名">
            </div>
            <div class="form-group">
                <label class="form-label">文件内容</label>
                <textarea class="form-input" id="createFileContent" placeholder="输入文件内容" style="min-height: 120px; resize: vertical;"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal('createFileModal')">取消</button>
                <button class="btn btn-primary" onclick="doCreateFile()">创建</button>
            </div>
        </div>
    </div>

    <!-- 格式化模态框 -->
    <div class="modal" id="formatModal">
        <div class="modal-content">
            <div class="modal-title">⚡ 格式化磁盘</div>
            <p style="color: #888; margin-bottom: 20px;">⚠️ 警告：此操作将清除所有数据，请确认！</p>
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal('formatModal')">取消</button>
                <button class="btn btn-primary" onclick="doFormat()">确认格式化</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8888';

        function showModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function switchView(view) {
            console.log('切换视图:', view);
            document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
        }

        function refreshData() {
            fetchStatus();
            fetchFiles();
        }

        async function fetchStatus() {
            try {
                const response = await fetch(`${API_URL}/api/status`);
                const data = await response.json();
                
                const blockSize = 512;
                const usedMB = (data.used_blocks * blockSize) / (1024 * 1024);
                const totalMB = (data.total_blocks * blockSize) / (1024 * 1024);
                const diskPercent = (data.used_blocks / data.total_blocks) * 100;
                
                document.getElementById('diskUsed').textContent = usedMB.toFixed(2) + ' MB';
                document.getElementById('diskProgress').style.width = diskPercent + '%';
                document.getElementById('inodeUsed').textContent = data.used_inodes;
                document.getElementById('inodeProgress').style.width = (data.used_inodes / data.total_inodes * 100) + '%';
                document.getElementById('currentUser').textContent = data.current_user + '@localhost';
            } catch (e) {
                console.error('获取状态失败:', e);
            }
        }

        async function fetchFiles() {
            try {
                const response = await fetch(`${API_URL}/api/dir`);
                const data = await response.json();
                
                let html = '';
                data.entries.forEach(entry => {
                    const icon = entry.type === 'dir' ? '📁' : '📄';
                    html += `
                        <div class="file-item">
                            <div class="file-icon">${icon}</div>
                            <div class="file-info">
                                <div class="file-name">${entry.name}</div>
                                <div class="file-meta">${entry.type} · ${entry.size} B · ${entry.perm}</div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('fileList').innerHTML = html || '<div style="padding: 20px; color: #888;">暂无文件</div>';
            } catch (e) {
                console.error('获取文件列表失败:', e);
            }
        }

        function doLogin() {
            console.log('登录:', document.getElementById('loginUser').value);
            closeModal('loginModal');
        }

        function doMkdir() {
            console.log('创建目录:', document.getElementById('mkdirName').value);
            closeModal('mkdirModal');
        }

        function doCreateFile() {
            console.log('创建文件:', document.getElementById('createFileName').value);
            closeModal('createFileModal');
        }

        function doFormat() {
            console.log('格式化磁盘');
            closeModal('formatModal');
        }

        function logout() {
            if (confirm('确定要登出吗？')) {
                console.log('已登出');
            }
        }

        function showHelp() {
            alert('📚 VFS 虚拟文件系统\n\n功能：\n• 多用户管理\n• 多级目录\n• 文件 I/O\n• 权限控制\n\n快捷键：\nCtrl+N: 新建文件\nCtrl+M: 新建文件夹\nCtrl+D: 删除文件');
        }

        function about() {
            alert('🗂️ Virtual File System v1.0\n\n一个高仿 UNIX 文件系统的教学实现\n\n© 2024');
        }

        // 初始化
        window.addEventListener('load', () => {
            refreshData();
            // 定期刷新
            setInterval(refreshData, 5000);
        });
    </script>
</body>
</html>
